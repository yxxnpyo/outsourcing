          command: "grep -q 'export function clampNumber' src/utils/clampNumber.ts"
        - name: "type-check"
          command: "npx tsc --noEmit --target ES2022 --module NodeNext --moduleResolution NodeNext src/utils/clampNumber.ts"
      payload:
        task_name: "clamp-number"
        worker_role: "clamp-number outsourced implementation worker"
        working_dir: "/Users/hongyp/Desktop/hongyp/dev/codex/outsourcing/plugin/test-fixtures/practical-smoke-workspace"
        task_background:
          - "This task provides a shared utility for safely constraining numeric ranges."
          - "Follow-up slider and form input flows should be able to reuse the same clamp helper."
        requests:
          - "Implement src/utils/clampNumber.ts."
          - "Keep the exact signature clampNumber(value: number, min: number, max: number): number."
